name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "21 3 * * 1"

jobs:
  analyze:
    runs-on: windows-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Build Core
        run: dotnet build src\Core\Core.csproj

      - name: Build Infrastructure
        run: dotnet build src\Infrastructure\Infrastructure.csproj

      - name: Restore Mobile workloads
        run: dotnet workload restore src\Mobile\Mobile.csproj --skip-manifest-update

      - name: Restore Android project
        run: dotnet restore src\Mobile\Mobile.csproj -f net10.0-android

      - name: Build Android app
        run: dotnet build src\Mobile\Mobile.csproj -f net10.0-android --no-restore

      - name: Analyze
        uses: github/codeql-action/analyze@v4