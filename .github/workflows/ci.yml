name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore core tests
        run: dotnet restore tests\Core.Tests\Core.Tests.csproj

      - name: Test core
        run: dotnet test tests\Core.Tests\Core.Tests.csproj --no-restore --logger trx

      - name: Restore infrastructure tests
        run: dotnet restore tests\Infrastructure.Tests\Infrastructure.Tests.csproj

      - name: Test infrastructure
        run: dotnet test tests\Infrastructure.Tests\Infrastructure.Tests.csproj --no-restore --logger trx

      - name: Restore Mobile workloads
        run: dotnet workload restore src\Mobile\Mobile.csproj --skip-manifest-update

      - name: Restore Android project
        run: dotnet restore src\Mobile\Mobile.csproj -p:TargetFramework=net10.0-android

      - name: Build Android app
        run: dotnet build src\Mobile\Mobile.csproj -f net10.0-android