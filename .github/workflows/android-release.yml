name: android-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  android-artifact:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore core tests
        run: dotnet restore tests\Core.Tests\Core.Tests.csproj

      - name: Test core
        run: dotnet test tests\Core.Tests\Core.Tests.csproj --no-restore --logger trx

      - name: Restore Mobile workloads
        run: dotnet workload restore src\Mobile\Mobile.csproj --skip-manifest-update

      - name: Restore Android project
        run: dotnet restore src\Mobile\Mobile.csproj -p:TargetFramework=net10.0-android

      - name: Publish unsigned APK
        run: dotnet publish src\Mobile\Mobile.csproj -f net10.0-android -c Release -p:AndroidPackageFormat=apk -p:AndroidKeyStore=false

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: hasbemaal-android-unsigned
          path: src\Mobile\bin\Release\net10.0-android\publish\*.apk
          retention-days: 14